# Trees Engineering — Treelancer Timesheets: one-click Render Blueprint.
#
# Single web service: FastAPI serves both the API (POST /api/generate-pdf) and
# the pre-built React app (frontend/dist, committed to the repo since Render's
# Python runtime doesn't include Node — see .gitignore). One deploy, one URL.
#
# Self-service: no accounts, no database, no email. A Treelancer fills the form
# and gets their PDF. Nothing to configure — just click "Apply" on the blueprint.
#
# NOTE: on the free plan the service spins down after ~15 minutes idle; the
# first request after that takes ~30-50s to wake up.

services:
  - type: web
    name: treelancer-timesheets
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
