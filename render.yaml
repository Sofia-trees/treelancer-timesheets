# Trees Engineering — Treelancer Timesheets: one-click Render Blueprint.
#
# Single web service: FastAPI serves both the API (under /api) and the
# pre-built React app (frontend/dist, committed to the repo since Render's
# Python runtime doesn't include Node — see .gitignore). One deploy, one URL.
#
# TT_JWT_SECRET is auto-generated by Render at deploy time — no manual input
# needed. Just click "Apply" on the blueprint.
#
# NOTE: this is a demo deploy. It uses SQLite on the service's local disk,
# which Render's free plan does not persist across restarts — the app
# reseeds its demo data automatically on every startup (see
# app.config.Settings.seed_on_startup), so it always comes back looking the
# same rather than broken. The free plan also spins the service down after
# ~15 minutes idle; the first request after that takes ~30-50s to wake up.

services:
  - type: web
    name: treelancer-timesheets
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: TT_JWT_SECRET
        generateValue: true
      - key: TT_EXPOSE_MAGIC_LINK
        value: "true"
